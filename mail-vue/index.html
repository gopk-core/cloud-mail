<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#F5F0E8" id="theme-color-meta">
  <meta name="description" content="GOPK Mail - A serverless responsive email service.">
  <title>GOPK Mail</title>
  <link rel="icon" href="/public/mail.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Tiempos+Text:ital,wght@0,400;0,500;1,400&family=Söhne:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script>
    const uiStoreStr =  localStorage.getItem('ui')
    if (uiStoreStr) {
      const uiStore =  JSON.parse(uiStoreStr)
      const root = document.documentElement
      root.setAttribute('class', uiStore.dark ? 'dark' : '');
      const metaTag = document.getElementById('theme-color-meta');
      const isMobile =  !window.matchMedia("(pointer: fine) and (hover: hover)").matches;
      metaTag.setAttribute('content', uiStore.dark ? (isMobile ? '#1a1915' : '#111110') : (isMobile ? '#FAF8F5' : '#F5F0E8'));
    }
  </script>
</head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap');

  html {
    background: #FAF8F5;
  }
  .dark {
    background: #1a1915;
  }

  #loading-first {
    position: fixed;
    left: 0;
    top: 0;
    height: 100%;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 500;
    background: #FAF8F5;
    gap: 28px;
  }

  .dark #loading-first {
    background: #1a1915;
  }

  .loading-hide {
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .loading-icon {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  /* Claude-style logo mark: layered diamond/rhombus shapes */
  .loading-logo {
    position: relative;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .loading-logo-inner {
    width: 44px;
    height: 44px;
    background: linear-gradient(145deg, #D97757 0%, #C96A45 50%, #B85D3A 100%);
    border-radius: 10px;
    transform: rotate(0deg);
    box-shadow: 0 4px 20px rgba(217, 119, 87, 0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: logo-pulse 2.4s ease-in-out infinite;
  }

  .loading-logo-inner svg {
    width: 26px;
    height: 26px;
    fill: rgba(255,255,255,0.92);
  }

  @keyframes logo-pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 4px 20px rgba(217, 119, 87, 0.35); }
    50% { transform: scale(1.04); box-shadow: 0 6px 28px rgba(217, 119, 87, 0.5); }
  }

  .loading-title {
    font-family: 'Newsreader', Georgia, serif;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.01em;
    color: #1a1915;
    opacity: 0.88;
  }

  .dark .loading-title {
    color: #F5F0E8;
  }

  /* Subtle dot-breathing loader */
  .loading-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .loading-dots span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #D97757;
    opacity: 0.3;
    animation: dot-breathe 1.4s ease-in-out infinite;
  }

  .loading-dots span:nth-child(1) { animation-delay: 0s; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-breathe {
    0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
    40% { opacity: 1; transform: scale(1.15); }
  }
</style>
<body>
<div id="loading-first">
  <div class="loading-icon">
    <div class="loading-logo">
      <div class="loading-logo-inner">
        <!-- Simplified Claude-style mark (envelope/letter shape) -->
        <svg viewBox="0 0 26 26" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="6" width="22" height="15" rx="2" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.8"/>
          <path d="M2 8.5l11 7 11-7" stroke="rgba(255,255,255,0.9)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
    <div class="loading-title">GOPK Mail</div>
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>
<div id="app"></div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
